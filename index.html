<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawn RNG</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            -webkit-tap-highlight-color: transparent; /* Smooth touch for iPad */
        }
        .container {
            text-align: center;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            border: 2px solid #333;
            max-width: 90%;
            width: 400px;
        }
        button {
            background: #ff4757;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s ease;
            width: 100%;
            box-sizing: border-box;
        }
        button:hover, button:active {
            transform: scale(1.02);
            background: #ff6b81;
        }
        #result {
            margin-top: 25px;
            font-size: 2.2rem;
            font-weight: bold;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .rarity {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎰 Pawn RNG 🎰</h2>
    <p>Roll to unlock your custom chess pawns, styll!</p>
    <button onclick="rollPawn()">ROLL NOW</button>
    <div id="result">---</div>
    <div id="rarity-label" class="rarity"></div>
</div>

<script>
    // 1. Define the pawns, their drop rates, and their colors
    const pawnPool = [
        { name: "🍞 Bread Pawn", rarity: "Common (50%)", weight: 50, color: "#d2b48c" },
        { name: "💧 Water Pawn", rarity: "Uncommon (25%)", weight: 25, color: "#3498db" },
        { name: "🌪️ Tornado Pawn", rarity: "Rare (15%)", weight: 15, color: "#9b59b6" },
        { name: "🔥 Lava Pawn", rarity: "Epic (9%)", weight: 9, color: "#e74c3c" },
        { name: "🐦 Seagull Pawn", rarity: "LEGENDARY (1%)", weight: 1, color: "#f1c40f" }
    ];

    function rollPawn() {
        // 2. Generate a random number between 1 and 100
        let roll = Math.floor(Math.random() * 100) + 1;
        let cumulativeWeight = 0;
        let selectedPawn = null;

        // 3. Run the RNG math loop
        for (let pawn of pawnPool) {
            cumulativeWeight += pawn.weight;
            if (roll <= cumulativeWeight) {
                selectedPawn = pawn;
                break;
            }
        }

        // 4. Update the screen
        const resultDiv = document.getElementById("result");
        const rarityDiv = document.getElementById("rarity-label");

        resultDiv.innerText = selectedPawn.name;
        resultDiv.style.color = selectedPawn.color;
        
        rarityDiv.innerText = selectedPawn.rarity;
        rarityDiv.style.color = selectedPawn.color;
    }
</script>

</body>
</html>
